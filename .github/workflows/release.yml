name: Release
on:
  push:
    tags: ["v*"]
jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub release
        run: gh release create "$GITHUB_REF_NAME" --generate-notes || true
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Upload XSD to release
        run: gh release upload "$GITHUB_REF_NAME" studierendendaten.xsd --clobber
        env:
          GH_TOKEN: ${{ github.token }}

  deploy-pages:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v30

      - name: Generate Pages content
        run: nix develop -c just generate-pages
        env:
          GH_TOKEN: ${{ github.token }}

      - uses: actions/configure-pages@v5
      - uses: actions/jekyll-build-pages@v1
        with:
          source: pages
      - uses: actions/upload-pages-artifact@v3
      - uses: actions/deploy-pages@v4
